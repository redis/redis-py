name: Publish tag to Pypi

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read  #  to fetch code (actions/checkout)

jobs:

  build_and_package:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # mandatory for OIDC trusted publishing
      contents: read    # needed because this job runs actions/checkout
    environment:
      name: pypi
      url: https://pypi.org/project/redis/
    steps:
      - uses: actions/checkout@v7
      - name: install python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: pip install build twine

      - name: Build package
        run: python -m build .

      - name: Basic package test prior to upload
        run: |
          twine check dist/*

      - name: Publish to Pypi
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
