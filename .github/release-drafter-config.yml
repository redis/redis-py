name-template: '5.2.1'
tag-template: 'v5.2.1'

pre-release: true

version-resolver:
  major:
    labels:
      - 'type: breakingchanges'
  minor:
    labels:
      - 'type: feature'
      - 'type: deprecation'
  patch:
    labels:
      - 'type: bug'
      - 'type: maintenance'
      - 'type: update-docs'
      - 'type: dependencies'
      - 'type: security'

filter-by-commitish: true
commitish: 6.0

autolabeler:
  - label: 'maintenance'
    files:
      - '*.md'
      - '.github/*'
  - label: 'bug'
    branch:
      - '/bug-.+'
  - label: 'maintenance'
    branch:
      - '/maintenance-.+'
  - label: 'feature'
    branch:
      - '/feature-.+'
categories:
  - title: '🚀 New Features'
    labels:
      - 'feature'
  - title: '🧪 Experimental Features'
    labels:
      - 'experimental'
  - title: '🔥 Breaking Changes'
    labels:
      - 'breakingchange'
  - title: '⚠️ Deprecations'
    labels:
      - 'deprecation'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bugfix'
      - 'bug'
  - title: '🧰 Maintenance'
    labels:
      - 'maintenance'
      - 'dependencies'
      - 'testing'
      - 'techdebt'
      - 'docs-review'
      - 'update-docs'
change-template: '- $TITLE (#$NUMBER)'
exclude-labels:
  - 'skip-changelog'

template: |
  # Changes

  $CHANGES

  ## Contributors
  We'd like to thank all the contributors who worked on this release!

  $CONTRIBUTORS

